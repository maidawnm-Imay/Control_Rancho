<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Mi Casa</title>
    
    <!-- Librería MQTT oficial cargada como módulo (Evita el error 'not defined') -->
    <script src="https://unpkg.com" type="text/javascript"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .status-luz {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #777;
            padding: 8px;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .btn {
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 10px 5px;
            cursor: pointer;
            border-radius: 8px;
            width: 80%;
            font-weight: bold;
            transition: background 0.3s ease;
        }
        .btn-on { background-color: #4CAF50; }
        .btn-on:hover { background-color: #45a049; }
        .btn-off { background-color: #f44336; }
        .btn-off:hover { background-color: #da190b; }
        #estado {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Luz del Fondo</h1>
        
        <div id="statusLuz" class="status-luz">ESTADO: DESCONOCIDO</div>

        <button class="btn btn-on" onclick="enviarComando('1')">ENCENDER</button>
        <button class="btn btn-off" onclick="enviarComando('0')">APAGAR</button>
        <p id="estado">Conectando al servidor MQTT...</p>
    </div>

    <script>
        // === CONFIGURACIÓN BROKER PÚBLICO SEGURO ===
        const MQTT_HOST = "://hivemq.com"; 
        const MQTT_PUERTO = 443; // Puerto SSL universal (no lo bloquea ningún router)
        const CLIENT_ID = "web_cliente_" + Math.random().toString(16).substr(2, 8);
        
        const TOPICO_COMANDO = "mihogar/seguro/rele1";
        const TOPICO_ESTADO = "mihogar/seguro/luz/estado";

        let cliente;

        try {
            // Conexión nativa por WebSockets Seguros (WSS)
            cliente = mqtt.connect(`wss://${MQTT_HOST}:${MQTT_PUERTO}/mqtt`, {
                clientId: CLIENT_ID,
                clean: true,
                connectTimeout: 4000
            });

            cliente.on('connect', function () {
                document.getElementById("estado").innerText = "Conectado al MQTT con éxito";
                document.getElementById("estado").style.color = "#4CAF50";
                cliente.subscribe(TOPICO_ESTADO);
            });

            cliente.on('close', function () {
                document.getElementById("estado").innerText = "Conexión perdida. Reintentando...";
                document.getElementById("estado").style.color = "#f44336";
                document.getElementById("statusLuz").innerText = "ESTADO: DESCONOCIDO";
                document.getElementById("statusLuz").style.color = "#777";
            });

            cliente.on('message', function (topic, message) {
                let payload = message.toString();
                if (topic === TOPICO_ESTADO) {
                    let txtEstado = document.getElementById("statusLuz");
                    if (payload === "1") {
                        txtEstado.innerText = "ESTADO: ENCENDIDO";
                        txtEstado.style.color = "#4CAF50";
                    } else if (payload === "0") {
                        txtEstado.innerText = "ESTADO: APAGADO";
                        txtEstado.style.color = "#f44336";
                    }
                }
            });

        } catch (e) {
            console.error("Error in MQTT connection:", e);
        }

        function enviarComando(payload) {
            if (cliente && cliente.connected) {
                cliente.publish(TOPICO_COMANDO, payload);
                console.log("Enviado comando: " + payload);
            } else {
                alert("No estás conectado al servidor MQTT todavía.");
            }
        }
    </script>
</body>
</html>
